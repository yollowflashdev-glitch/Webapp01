<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NickStyle ❤️ My Favorites</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --aurora1: #7c3aed;
    --aurora2: #06b6d4;
    --aurora3: #ec4899;
    --aurora4: #f97316;
    --bg: #0f0a1e;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #f1f0ff;
    --muted: #8b89a8;
    --glass: rgba(124,58,237,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(124,58,237,0.22) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 10%, rgba(6,182,212,0.16) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 100%, rgba(236,72,153,0.14) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(20px);
    background: rgba(15,10,30,0.7);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.35rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #38bdf8, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
    text-decoration: none;
  }

  .nav-right {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .nav-link {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
  }
  .nav-link:hover {
    background: rgba(124,58,237,0.2);
    border-color: rgba(167,139,250,0.4);
    color: #c4b5fd;
  }
  .nav-link.active {
    background: rgba(236,72,153,0.2);
    border-color: rgba(244,114,182,0.4);
    color: #f472b6;
  }

  /* HERO */
  .hero {
    position: relative; z-index: 1;
    text-align: center;
    padding: 48px 20px 28px;
  }

  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 700;
    background: linear-gradient(135deg, #f472b6 0%, #a78bfa 50%, #38bdf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .hero p {
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 0;
  }

  .hero-count {
    display: inline-block;
    margin-top: 14px;
    padding: 6px 18px;
    border-radius: 999px;
    background: rgba(236,72,153,0.12);
    border: 1px solid rgba(244,114,182,0.3);
    color: #f472b6;
    font-size: 0.78rem;
    font-weight: 600;
  }

  /* ACTIONS */
  .actions-bar {
    position: relative; z-index: 1;
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 20px 20px 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 8px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .action-btn:hover { background: rgba(124,58,237,0.18); color: #c4b5fd; border-color: rgba(167,139,250,0.4); }
  .action-btn.danger:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.35); }

  /* MAIN */
  main {
    position: relative; z-index: 1;
    max-width: 1140px;
    margin: 0 auto;
    padding: 16px 16px 60px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .emoji { font-size: 3.5rem; margin-bottom: 18px; }
  .empty-state h2 { font-size: 1.1rem; font-weight: 600; color: #a78bfa; margin-bottom: 8px; }
  .empty-state p { font-size: 0.83rem; line-height: 1.6; margin-bottom: 24px; }
  .go-btn {
    display: inline-block;
    padding: 10px 24px;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    color: #fff;
    font-weight: 600;
    font-size: 0.85rem;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .go-btn:hover { opacity: 0.85; }

  /* SECTION TITLE */
  .section-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 24px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CARDS GRID */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .fav-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px 14px;
    transition: transform 0.18s, border-color 0.18s, background 0.18s;
    position: relative;
  }
  .fav-card:hover {
    transform: translateY(-3px);
    border-color: rgba(244,114,182,0.4);
    background: rgba(236,72,153,0.06);
  }

  .card-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-cat {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(167,139,250,0.12);
    border: 1px solid rgba(167,139,250,0.2);
    color: #a78bfa;
  }

  .card-text {
    font-size: 1.2rem;
    line-height: 1.5;
    word-break: break-word;
    min-height: 40px;
  }

  .card-footer {
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .copy-btn {
    padding: 5px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
  }
  .copy-btn:hover { background: rgba(167,139,250,0.15); color: #c4b5fd; border-color: rgba(167,139,250,0.4); }
  .copy-btn.copied { background: rgba(16,185,129,0.2); color: #34d399; border-color: rgba(52,211,153,0.4); }

  .del-btn {
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
    line-height: 1;
  }
  .del-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.35); }

  .saved-time {
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.6;
    margin-left: auto;
  }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: rgba(52,211,153,0.15);
    border: 1px solid rgba(52,211,153,0.35);
    color: #34d399;
    padding: 10px 22px;
    border-radius: 12px;
    font-size: 0.82rem;
    font-weight: 500;
    backdrop-filter: blur(12px);
    transition: transform 0.3s ease;
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* FOOTER */
  footer {
    position: relative; z-index: 1;
    text-align: center;
    padding: 20px;
    color: var(--muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo" href="index.html">✦ NickStyle</a>
  <div class="nav-right">
    <a class="nav-link" href="index.html">🏠 Home</a>
    <a class="nav-link active" href="favorites.html">❤️ Favorites</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>❤️ My Favorites</h1>
  <p>Your saved styles, all in one place ✨</p>
  <div class="hero-count" id="favCount">0 styles saved</div>
</section>

<!-- ACTIONS -->
<div class="actions-bar" id="actionsBar" style="display:none">
  <button class="action-btn" onclick="copyAll()">📋 Copy All</button>
  <button class="action-btn danger" onclick="clearAll()">🗑️ Clear All</button>
</div>

<!-- MAIN -->
<main id="mainGrid">
  <!-- filled by JS -->
</main>

<!-- TOAST -->
<div id="toast">✓ Copied to clipboard!</div>

<footer>
  Made with 💜 &nbsp;|&nbsp; Free to use &nbsp;|&nbsp; Works on PUBG · Free Fire · Instagram · WhatsApp
</footer>

<script>
  const STORAGE_KEY = 'nickstyle_favorites';

  function getFavorites() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveFavorites(favs) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(favs));
  }

  function deleteFav(index) {
    const favs = getFavorites();
    favs.splice(index, 1);
    saveFavorites(favs);
    renderFavorites();
  }

  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '⎘ Copy'; btn.classList.remove('copied'); }, 1800);
      showToast('✓ Copied to clipboard!');
    });
  }

  function copyAll() {
    const favs = getFavorites();
    if (!favs.length) return;
    const text = favs.map(f => f.text).join('\n');
    navigator.clipboard.writeText(text).then(() => {
      showToast(`✓ All ${favs.length} styles copied!`);
    });
  }

  function clearAll() {
    if (!confirm('All favorites will be deleted. Are you sure?')) return;
    localStorage.removeItem(STORAGE_KEY);
    renderFavorites();
  }

  function timeAgo(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    const hrs  = Math.floor(diff / 3600000);
    const days = Math.floor(diff / 86400000);
    if (mins < 1)  return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    if (hrs  < 24) return `${hrs}h ago`;
    return `${days}d ago`;
  }

  function renderFavorites() {
    const favs   = getFavorites();
    const grid   = document.getElementById('mainGrid');
    const count  = document.getElementById('favCount');
    const actBar = document.getElementById('actionsBar');

    count.textContent = `${favs.length} style${favs.length !== 1 ? 's' : ''} saved`;

    if (!favs.length) {
      actBar.style.display = 'none';
      grid.innerHTML = `
        <div class="empty-state">
          <div class="emoji">💔</div>
          <h2>No favorites yet!</h2>
          <p>Go to the generator, type your name,<br>and click ❤️ on any style to save it.</p>
          <a class="go-btn" href="index.html">✦ Generate Names</a>
        </div>`;
      return;
    }

    actBar.style.display = 'flex';

    // Group by category
    const groups = {};
    favs.forEach((f, i) => {
      const cat = f.category || 'Other';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push({ ...f, idx: i });
    });

    const catEmoji = { gaming:'🎮 Gaming', cute:'🌸 Cute', dark:'🔥 Dark', classic:'✍ Classic', Other:'✦ Other' };

    grid.innerHTML = '';
    Object.keys(groups).forEach(cat => {
      const h = document.createElement('div');
      h.className = 'section-title';
      h.textContent = catEmoji[cat] || cat;
      grid.appendChild(h);

      const g = document.createElement('div');
      g.className = 'cards-grid';

      groups[cat].forEach(item => {
        const card = document.createElement('div');
        card.className = 'fav-card';
        card.innerHTML = `
          <div class="card-label">
            <span>${item.label || 'Style'}</span>
            <span class="card-cat">${cat}</span>
          </div>
          <div class="card-text">${item.text}</div>
          <div class="card-footer">
            <button class="copy-btn" onclick="copyText(this, \`${item.text.replace(/`/g,'\\`')}\`)">⎘ Copy</button>
            <span class="saved-time">${timeAgo(item.savedAt || Date.now())}</span>
            <button class="del-btn" onclick="deleteFav(${item.idx})" title="Remove">🗑</button>
          </div>
        `;
        g.appendChild(card);
      });

      grid.appendChild(g);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg || '✓ Done!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Init
  renderFavorites();
</script>
</body>
</html>
